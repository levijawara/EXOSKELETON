version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      playwright:
        patterns:
          - "@playwright/*"
          - "playwright"
      next:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "eslint"
          - "eslint-config-next"
